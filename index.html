<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saber Code Generat</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
    body {
        background: #000;
        overflow: hidden;
    }

    /* Gold gradient text */
    .gold-text {
        background: linear-gradient(90deg,#bf953f,#fcf6ba,#aa771c);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Glassmorphism */
    .glass-box {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(191,149,63,0.4);
        box-shadow: 0 0 40px rgba(191,149,63,0.15);
    }

    /* Gold button */
    .gold-btn {
        background: linear-gradient(90deg,#bf953f,#fcf6ba,#aa771c);
        color: black;
        font-weight: bold;
        transition: 0.3s ease;
    }

    .gold-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px #bf953f;
    }

    /* Progress Bar */
    .progress-bar {
        background: linear-gradient(90deg,#bf953f,#fcf6ba,#aa771c);
        height: 6px;
        transition: width 1s linear;
    }

    canvas {
        position: fixed;
        top:0;
        left:0;
        z-index:0;
    }
</style>
</head>
<body class="flex items-center justify-center min-h-screen relative text-white">

<canvas id="particles"></canvas>

<div class="glass-box relative z-10 w-[90%] max-w-md p-8 rounded-2xl text-center">

    <h1 class="text-3xl font-bold mb-6 gold-text tracking-widest">
        Saber Code Generat
    </h1>

    <!-- Step 1 -->
    <div id="stepInput">
        <input 
            id="accessCode"
            type="text"
            placeholder="Enter Access Code"
            class="w-full p-3 rounded-lg bg-black/60 border border-yellow-700 text-center outline-none mb-4"
        />
        <button id="verifyBtn" class="gold-btn w-full py-3 rounded-lg">
            VERIFY
        </button>
    </div>

    <!-- Step 2 -->
    <div id="stepTimer" class="hidden">
        <div class="text-6xl font-bold gold-text mb-6" id="countdown">
            10
        </div>
        <div class="w-full bg-black/40 rounded-full">
            <div id="progress" class="progress-bar w-0 rounded-full"></div>
        </div>
    </div>

    <!-- Step 3 -->
    <div id="stepLink" class="hidden">
        <button id="goLink" class="gold-btn w-full py-3 rounded-lg">
            GO TO LINK
        </button>
    </div>

</div>

<script type="module">
import { verifyCode, getTargetLink } from './api/linkandcode.js';

const input = document.getElementById('accessCode');
const verifyBtn = document.getElementById('verifyBtn');
const stepInput = document.getElementById('stepInput');
const stepTimer = document.getElementById('stepTimer');
const stepLink = document.getElementById('stepLink');
const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress');
const goLinkBtn = document.getElementById('goLink');

verifyBtn.addEventListener('click', () => {
    const value = input.value.trim();

    if (verifyCode(value)) {
        startTimer();
    } else {
        input.classList.add("border-red-500");
        setTimeout(() => input.classList.remove("border-red-500"), 1500);
    }
});

function startTimer() {
    stepInput.classList.add("hidden");
    stepTimer.classList.remove("hidden");

    let timeLeft = 10;
    countdownEl.textContent = timeLeft;

    const interval = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft;
        progressBar.style.width = ((10 - timeLeft) * 10) + "%";

        if (timeLeft <= 0) {
            clearInterval(interval);
            stepTimer.classList.add("hidden");
            stepLink.classList.remove("hidden");
        }
    }, 1000);
}

goLinkBtn.addEventListener('click', () => {
    window.location.href = getTargetLink();
});

/* ===========================
   Gold Dust Particle System
=========================== */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let particles = [];

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 2;
        this.speedY = Math.random() * 0.5 + 0.2;
    }

    update() {
        this.y -= this.speedY;
        if (this.y < 0) {
            this.y = canvas.height;
            this.x = Math.random() * canvas.width;
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(191,149,63,0.8)";
        ctx.fill();
    }
}

for (let i = 0; i < 120; i++) {
    particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
